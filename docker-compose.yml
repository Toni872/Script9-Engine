name: script9-engine

networks:
  script9-net:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - script9-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-script9}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-script9secret}
      POSTGRES_DB: ${POSTGRES_DB:-script9_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-script9}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - script9-net
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - script9-net
    ports:
      - '8082:8081'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-script9}:${POSTGRES_PASSWORD:-script9secret}@db:5432/${POSTGRES_DB:-script9_db}
      REDIS_URL: redis://redis:6379/0
      FIREBASE_CREDENTIALS_PATH: /app/firebase-credentials.json
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_STARTER_PRICE_ID: ${STRIPE_STARTER_PRICE_ID:-}
      STRIPE_PROFESSIONAL_PRICE_ID: ${STRIPE_PROFESSIONAL_PRICE_ID:-}
      STRIPE_ENTERPRISE_PRICE_ID: ${STRIPE_ENTERPRISE_PRICE_ID:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    volumes:
      # Firebase credentials (no incluido en la imagen por seguridad)
      - ./backend/firebase-credentials.json:/app/firebase-credentials.json:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - script9-net
    ports:
      - '5174:80'
    depends_on:
      - api

volumes:
  postgres_data:
